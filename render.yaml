services:
  - type: web
    name: warehouse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-db
          property: connectionString

databases:
  - name: warehouse-db
    databaseName: warehouse_db
    user: warehouse_user
    plan: free
